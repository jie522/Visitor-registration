<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>訪客登記</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue-60: #0f62fe;
    --blue-70: #0043ce;
    --blue-10: #edf5ff;
    --teal-60: #007d79;
    --teal-70: #005d5d;
    --teal-10: #d9fbfb;
    --gray-100: #161616;
    --gray-90: #262626;
    --gray-70: #525252;
    --gray-50: #8d8d8d;
    --gray-20: #e0e0e0;
    --gray-10: #f4f4f4;
    --white: #ffffff;
    --green-50: #24a148;
    --red-60: #da1e28;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--white);
    color: var(--gray-100);
    font-family: "Noto Sans TC", -apple-system, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  header {
    background: var(--gray-100);
    color: var(--white);
    padding: 20px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 4px solid var(--blue-60);
  }

  header .mark {
    width: 28px;
    height: 28px;
    background: var(--blue-60);
    flex: none;
  }

  header h1 {
    font-size: 18px;
    font-weight: 600;
    margin: 0;
    letter-spacing: 0.01em;
  }

  header p {
    margin: 2px 0 0;
    font-size: 12px;
    color: var(--gray-50);
  }

  main {
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 16px 80px;
  }

  .intro {
    font-size: 13px;
    color: var(--gray-70);
    line-height: 1.5;
    margin: 0 0 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--gray-20);
  }

  .screen[hidden] { display: none; }

  /* --- vendor type tiles --- */
  .tiles {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .tile {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    width: 100%;
    text-align: left;
    background: var(--gray-10);
    border: none;
    border-left: 3px solid transparent;
    padding: 20px;
    font-family: inherit;
    cursor: pointer;
    transition: background-color 70ms cubic-bezier(0.2, 0, 0.38, 0.9), border-color 70ms cubic-bezier(0.2, 0, 0.38, 0.9);
  }

  .tile:active,
  .tile:focus-visible { outline: none; }

  .tile[data-type="contracted"] { background: var(--blue-10); }
  .tile[data-type="contracted"]:hover { background: #e0edff; }
  .tile[data-type="contracted"]:active,
  .tile[data-type="contracted"]:focus-visible { border-left-color: var(--blue-60); }
  .tile[data-type="contracted"] .tile-icon { color: var(--blue-70); }

  .tile[data-type="general"] { background: var(--teal-10); }
  .tile[data-type="general"]:hover { background: #c3f5f5; }
  .tile[data-type="general"]:active,
  .tile[data-type="general"]:focus-visible { border-left-color: var(--teal-60); }
  .tile[data-type="general"] .tile-icon { color: var(--teal-70); }

  .tile-icon {
    flex: none;
    width: 32px;
    height: 32px;
  }

  .tile-icon svg {
    width: 100%;
    height: 100%;
  }

  .tile-body { flex: 1; }

  .tile-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--gray-100);
  }

  .tile-sub {
    font-size: 11px;
    color: var(--gray-50);
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.02em;
  }

  .tile-desc {
    font-size: 13px;
    color: var(--gray-70);
    margin-top: 8px;
  }

  /* --- back link / badge --- */
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: none;
    border: none;
    padding: 0;
    margin-bottom: 20px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    color: var(--blue-60);
    cursor: pointer;
  }

  .back-link:hover { color: var(--blue-70); text-decoration: underline; }

  .badge {
    display: inline-block;
    background: var(--blue-10);
    color: var(--blue-70);
    font-size: 12px;
    font-weight: 600;
    padding: 4px 10px;
    margin-bottom: 16px;
  }

  form {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .field {
    display: flex;
    flex-direction: column;
  }

  .field label {
    font-size: 12px;
    font-weight: 600;
    color: var(--gray-100);
    margin-bottom: 8px;
  }

  .field .req {
    color: var(--red-60);
    margin-left: 2px;
  }

  .field input,
  .field select {
    appearance: none;
    -webkit-appearance: none;
    width: 100%;
    height: 48px;
    padding: 0 16px;
    font-size: 16px;
    font-family: inherit;
    color: var(--gray-100);
    background: var(--gray-10);
    border: none;
    border-bottom: 1px solid var(--gray-50);
    border-radius: 0;
    outline: none;
    transition: background-color 70ms cubic-bezier(0.2, 0, 0.38, 0.9);
  }

  .field input::placeholder { color: var(--gray-50); }

  .field input:hover,
  .field select:hover { background: #e8e8e8; }

  .field input:focus,
  .field select:focus {
    background: var(--gray-10);
    border-bottom: 2px solid var(--blue-60);
    box-shadow: inset 0 0 0 2px var(--blue-60), inset 0 -2px 0 0 var(--blue-60);
    padding-left: 15px;
  }

  .field .hint {
    font-size: 12px;
    color: var(--gray-70);
    margin-top: 6px;
  }

  .field .error {
    font-size: 12px;
    color: var(--red-60);
    margin-top: 6px;
    display: none;
  }

  .field.invalid input {
    box-shadow: inset 0 0 0 1px var(--red-60);
    border-bottom: 1px solid var(--red-60);
  }

  .field.invalid .error { display: block; }

  select {
    background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 16 16'%3E%3Cpath fill='%23161616' d='M8 11L3 6l.7-.7L8 9.6l4.3-4.3.7.7z'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 16px center;
  }

  .primary-btn,
  button[type="submit"] {
    margin-top: 8px;
    height: 52px;
    background: var(--blue-60);
    color: var(--white);
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    border: none;
    border-radius: 0;
    cursor: pointer;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background-color 70ms cubic-bezier(0.2, 0, 0.38, 0.9);
  }

  .primary-btn:hover,
  button[type="submit"]:hover { background: var(--blue-70); }
  .primary-btn:disabled,
  button[type="submit"]:disabled { background: var(--gray-50); cursor: not-allowed; }

  .arrow { font-size: 18px; line-height: 1; }

  .status {
    margin-top: 20px;
    padding: 16px;
    font-size: 14px;
    display: none;
    align-items: flex-start;
    gap: 10px;
    border-left: 3px solid transparent;
  }

  .status.show { display: flex; }

  .status.success {
    background: #defbe6;
    border-left-color: var(--green-50);
    color: #0e6027;
  }

  .status.error {
    background: #fff1f1;
    border-left-color: var(--red-60);
    color: #a2191f;
  }

  .status .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-top: 5px;
    flex: none;
    background: currentColor;
  }

  footer {
    max-width: 480px;
    margin: 0 auto;
    padding: 0 16px 32px;
    font-size: 11px;
    color: var(--gray-50);
  }
</style>
</head>
<body>
  <header>
    <div class="mark"></div>
    <div>
      <h1>訪客登記表</h1>
      <p>260713 · Visitor Registration</p>
    </div>
  </header>

  <main>
    <!-- 畫面 1：選擇廠商類型 -->
    <section class="screen" id="screenSelect">
      <p class="intro">請選擇廠商類型以開始登記。</p>
      <div class="tiles">
        <button type="button" class="tile" data-type="contracted">
          <span class="tile-icon" aria-hidden="true">
            <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="6" width="26" height="20" rx="1"/>
              <circle cx="11.5" cy="15" r="3"/>
              <path d="M7 22c0-2.5 2-4 4.5-4s4.5 1.5 4.5 4"/>
              <line x1="19" y1="12" x2="25" y2="12"/>
              <line x1="19" y1="16" x2="25" y2="16"/>
            </svg>
          </span>
          <span class="tile-body">
            <div class="tile-title">特約廠商</div>
            <div class="tile-sub">Contracted Vendor</div>
            <div class="tile-desc">輸入手機號碼登入，自動帶入廠商 / 姓名 / 對接同仁</div>
          </span>
        </button>
        <button type="button" class="tile" data-type="general">
          <span class="tile-icon" aria-hidden="true">
            <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M8 3h12l6 6v20H8z"/>
              <path d="M20 3v6h6"/>
              <line x1="12" y1="17" x2="23" y2="17"/>
              <line x1="12" y1="22" x2="23" y2="22"/>
              <line x1="12" y1="12" x2="16" y2="12"/>
            </svg>
          </span>
          <span class="tile-body">
            <div class="tile-title">一般廠商</div>
            <div class="tile-sub">General Vendor</div>
            <div class="tile-desc">自行填寫完整登記資料</div>
          </span>
        </button>
      </div>
    </section>

    <!-- 畫面 2：特約廠商手機登入 -->
    <section class="screen" id="screenAuth" hidden>
      <button type="button" class="back-link" id="authBack">‹ 返回選擇廠商類型</button>
      <p class="intro">請輸入登記時使用的手機號碼進行登入。</p>
      <div class="field" id="phoneField">
        <label for="phone">手機號碼 <span class="req">*</span></label>
        <input type="tel" id="phone" inputmode="numeric" maxlength="10" placeholder="請輸入手機號碼，例如 0912345678">
        <div class="error" id="phoneError">查無此手機號碼，請確認後重新輸入，或改選一般廠商登記</div>
      </div>
      <button type="button" class="primary-btn" id="authSubmit">
        <span id="authLabel">登入查詢</span>
        <span class="arrow">→</span>
      </button>
    </section>

    <!-- 畫面 3：登記表單 -->
    <section class="screen" id="screenForm" hidden>
      <div class="badge" id="vendorBadge"></div>
      <button type="button" class="back-link" id="formBack">‹ 重新選擇</button>
      <p class="intro">請確認以下資料完成訪客登記，資料將直接送出予櫃檯 / 對接同仁確認。</p>

      <form id="visitorForm" novalidate>
        <div class="field" data-field="date">
          <label for="date">日期 <span class="req">*</span></label>
          <input type="date" id="date" name="date" required>
          <div class="error">請選擇日期</div>
        </div>

        <div class="field" data-field="vendor">
          <label for="vendor">廠商 <span class="req">*</span></label>
          <input type="text" id="vendor" name="vendor" placeholder="請輸入公司 / 廠商名稱" required>
          <div class="error">請輸入廠商名稱</div>
        </div>

        <div class="field" data-field="name">
          <label for="name">姓名 <span class="req">*</span></label>
          <input type="text" id="name" name="name" placeholder="請輸入訪客姓名" required>
          <div class="error">請輸入姓名</div>
        </div>

        <div class="field" data-field="arrival">
          <label for="arrival">預計抵達時間 <span class="req">*</span></label>
          <input type="time" id="arrival" name="arrival" required>
          <div class="error">請選擇預計抵達時間</div>
        </div>

        <div class="field" data-field="contact">
          <label for="contact">對接同仁 <span class="req">*</span></label>
          <input type="text" id="contact" name="contact" placeholder="請輸入對接同仁姓名" required>
          <div class="error">請輸入對接同仁</div>
        </div>

        <button type="submit" id="submitBtn">
          <span id="submitLabel">送出登記</span>
          <span class="arrow">→</span>
        </button>

        <div class="status" id="statusBox">
          <div class="dot"></div>
          <div id="statusText"></div>
        </div>
      </form>
    </section>
  </main>

  <footer>由 Google Sheet 驅動 · 資料僅供內部訪客管理使用</footer>

<script>
  // 部署 Apps Script Web App 後，將網址貼在這裡
  const GAS_URL = "https://script.google.com/macros/s/AKfycbwe6O7oCqGGjeg8qPuSil5B_5G2pNY_j1I9N2WXzXTo1B_UHq2n2SoYa-LgswTv0sXt/exec";

  const screens = {
    select: document.getElementById("screenSelect"),
    auth: document.getElementById("screenAuth"),
    form: document.getElementById("screenForm"),
  };

  function showScreen(name) {
    Object.entries(screens).forEach(([key, el]) => {
      el.hidden = key !== name;
    });
    window.scrollTo({ top: 0 });
  }

  const today = new Date();
  const todayStr = today.toISOString().slice(0, 10);

  const form = document.getElementById("visitorForm");
  const submitBtn = document.getElementById("submitBtn");
  const submitLabel = document.getElementById("submitLabel");
  const statusBox = document.getElementById("statusBox");
  const statusText = document.getElementById("statusText");
  const dateInput = document.getElementById("date");
  const vendorInput = document.getElementById("vendor");
  const nameInput = document.getElementById("name");
  const arrivalInput = document.getElementById("arrival");
  const contactInput = document.getElementById("contact");
  const vendorBadge = document.getElementById("vendorBadge");

  function resetFormFields() {
    form.reset();
    form.querySelectorAll(".field").forEach((f) => f.classList.remove("invalid"));
    statusBox.className = "status";
    dateInput.value = todayStr;
  }

  function openGeneralForm() {
    resetFormFields();
    vendorBadge.textContent = "一般廠商";
    showScreen("form");
    vendorInput.focus();
  }

  function openContractedForm(vendorData) {
    resetFormFields();
    vendorInput.value = vendorData.vendor || "";
    nameInput.value = vendorData.name || "";
    contactInput.value = vendorData.contact || "";
    vendorBadge.textContent = "特約廠商 · " + (vendorData.vendor || "");
    showScreen("form");
    arrivalInput.focus();
  }

  document.querySelectorAll(".tile").forEach((tile) => {
    tile.addEventListener("click", () => {
      const type = tile.dataset.type;
      if (type === "general") {
        openGeneralForm();
      } else {
        document.getElementById("phoneField").classList.remove("invalid");
        document.getElementById("phone").value = "";
        showScreen("auth");
        document.getElementById("phone").focus();
      }
    });
  });

  document.getElementById("authBack").addEventListener("click", () => showScreen("select"));
  document.getElementById("formBack").addEventListener("click", () => showScreen("select"));

  // --- 特約廠商手機查詢（JSONP，避開 Apps Script 的 CORS 限制） ---
  function lookupVendor(phone) {
    return new Promise((resolve, reject) => {
      const cbName = "vendorCb_" + Date.now();
      const script = document.createElement("script");
      let settled = false;

      const cleanup = () => {
        delete window[cbName];
        script.remove();
      };

      window[cbName] = (data) => {
        if (settled) return;
        settled = true;
        cleanup();
        resolve(data);
      };

      script.src = GAS_URL + "?action=lookup&phone=" + encodeURIComponent(phone) + "&callback=" + cbName;
      script.onerror = () => {
        if (settled) return;
        settled = true;
        cleanup();
        reject(new Error("network"));
      };
      document.body.appendChild(script);

      setTimeout(() => {
        if (settled) return;
        settled = true;
        cleanup();
        reject(new Error("timeout"));
      }, 8000);
    });
  }

  const phoneField = document.getElementById("phoneField");
  const phoneInput = document.getElementById("phone");
  const authSubmit = document.getElementById("authSubmit");
  const authLabel = document.getElementById("authLabel");

  async function submitAuth() {
    const phone = phoneInput.value.trim();
    phoneField.classList.remove("invalid");

    if (!phone) {
      phoneField.classList.add("invalid");
      document.getElementById("phoneError").textContent = "請輸入手機號碼";
      phoneField.querySelector(".error").style.display = "block";
      return;
    }

    if (!GAS_URL || GAS_URL === "PASTE_YOUR_WEB_APP_URL_HERE") {
      phoneField.classList.add("invalid");
      document.getElementById("phoneError").textContent = "尚未設定 Google Apps Script 網址，請聯絡系統管理員";
      return;
    }

    authSubmit.disabled = true;
    authLabel.textContent = "查詢中...";

    try {
      const data = await lookupVendor(phone);
      if (data && data.found) {
        openContractedForm(data);
      } else {
        phoneField.classList.add("invalid");
        document.getElementById("phoneError").textContent = "查無此手機號碼，請確認後重新輸入，或改選一般廠商登記";
      }
    } catch (err) {
      phoneField.classList.add("invalid");
      document.getElementById("phoneError").textContent = "查詢失敗，請確認網路連線後重試";
    } finally {
      authSubmit.disabled = false;
      authLabel.textContent = "登入查詢";
    }
  }

  authSubmit.addEventListener("click", submitAuth);
  phoneInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      e.preventDefault();
      submitAuth();
    }
  });

  // --- 登記表單送出 ---
  function setStatus(type, message) {
    statusBox.className = "status show " + type;
    statusText.textContent = message;
  }

  function validate() {
    let valid = true;
    form.querySelectorAll(".field").forEach((field) => {
      const input = field.querySelector("input");
      if (!input.value) {
        field.classList.add("invalid");
        valid = false;
      } else {
        field.classList.remove("invalid");
      }
    });
    return valid;
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    statusBox.className = "status";

    if (!validate()) {
      setStatus("error", "請完整填寫所有必填欄位");
      return;
    }

    if (!GAS_URL || GAS_URL === "PASTE_YOUR_WEB_APP_URL_HERE") {
      setStatus("error", "尚未設定 Google Apps Script 網址，請聯絡系統管理員");
      return;
    }

    const payload = {
      date: dateInput.value,
      vendor: vendorInput.value.trim(),
      name: nameInput.value.trim(),
      arrival: arrivalInput.value,
      contact: contactInput.value.trim(),
    };

    submitBtn.disabled = true;
    submitLabel.textContent = "送出中...";

    try {
      await fetch(GAS_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload),
      });

      setStatus("success", "登記成功，感謝您的到訪！");
    } catch (err) {
      setStatus("error", "送出失敗，請確認網路連線後重試");
    } finally {
      submitBtn.disabled = false;
      submitLabel.textContent = "送出登記";
    }
  });
</script>
</body>
</html>
